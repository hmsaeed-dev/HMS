	<body>
		<!-- SCROLL PROGRESS -->
		<div class="scroll-progress" id="scrollProgress"></div>

		<!-- Hero Section -->
		<header class="cs-hero">
			<div class="cs-hero-content">
				<h1 class="cs-title">Selected Works</h1>
				<p class="cs-intro">
					A closer look at what I've built, why I built it, and how it came together.
				</p>

				<div class="cs-hero-stats">
					<div class="cs-stat">
						<span class="cs-stat-num" id="statProjects">0</span>
						<span class="cs-stat-label">Builds</span>
					</div>
					<div class="cs-stat">
						<span class="cs-stat-num" id="statTech">0</span>
						<span class="cs-stat-label">Technologies</span>
					</div>
					<div class="cs-stat">
						<span class="cs-stat-num" id="statMetrics">100%</span>
						<span class="cs-stat-label">Open Source</span>
					</div>
				</div>
			</div>
		</header>

		<!-- Main Workspace -->
		<main class="container">
			<!-- Filter & Layout Switcher Bar -->
			<div class="cs-filter-bar" id="projectFilterBar">
				<!-- <div class="cs-filter-left" id="categoryFilters">
					Injected by JavaScript
				</div> -->

				<div class="cs-filter-right">
					<div class="cs-view-switcher" id="viewSwitcher">
						<button class="cs-switch-btn active" data-view="case-studies" aria-label="Detailed Case Studies Mode">
							<svg class="icon icon-btn-svg" style="width:1.2em; height:1.2em; stroke-width:2;"><use href="#icon-academic"/></svg>
							<span>Case Studies</span>
						</button>
						<button class="cs-switch-btn" data-view="grid-showcase" aria-label="Visual Grid Showcase Mode">
							<svg class="icon icon-btn-svg" style="width:1.2em; height:1.2em; stroke-width:2;"><use href="#icon-grid"/></svg>
							<span>Showcase</span>
						</button>
					</div>
				</div>
			</div>

			<!-- Dynamic Content Wrappers -->
			<div id="case-studies-container" class="cs-section-view">
				<!-- Ingested dynamically by JS -->
			</div>

			<div id="projects-grid-container" class="cs-section-view hidden">
				<div class="projects-grid" id="projects-grid">
					<!-- Ingested dynamically by JS -->
				</div>
			</div>

			<!-- Collaboration CTA -->
			<section class="projects-cta reveal">
				<div class="projects-cta-box">
					<h3 class="cta-heading">Have a project in mind? </h3>
					<p class="cta-text">
						I'd love to hear about it.
					</p>
					<div class="cta-actions">
						<a href="../index.html#contact" class="btn btn-olive">
							<span>Get In Touch</span>
							<svg class="icon icon-md"><use href="#icon-mail"/></svg>
						</a>
					</div>
				</div>
			</section>
		</main>

		<!-- Template for Case Study Editorial Row -->
		<template id="tpl-case-study">
			<section class="case-study reveal">
				<div class="cs-grid">
					<!-- Left Meta Sticky Panel -->
					<aside class="cs-meta">
						<h2 class="cs-sidebar-title"></h2>
						<p class="cs-sidebar-desc"></p>

						<!-- Specs and Tech for DESKTOP (hidden on mobile) -->
						<div class="cs-desktop-specs">
							<div class="cs-tech-list d-tech">
								<!-- Injected tech tags -->
							</div>
						</div>

						<div class="cs-links-wrap">
							<!-- Action links -->
						</div>
					</aside>

					<!-- Right Narrative & Interactive Panel -->
					<article class="cs-content">
						<!-- Case Study Tab Bar (Visible on mobile, hidden on desktop) -->
						<div class="cs-tab-bar" role="tablist">
							<button class="cs-tab-btn active" role="tab" data-tab="brief" aria-selected="true">Brief</button>
							<button class="cs-tab-btn" role="tab" data-tab="architecture" aria-selected="false">Architecture</button>
							<button class="cs-tab-btn" role="tab" data-tab="sandbox" aria-selected="false">Interactive Sandbox</button>
						</div>

						<!-- Tab Content: Brief -->
						<div class="cs-tab-content active" data-tab="brief" role="tabpanel">
							<div class="cs-brief-sections">
								<!-- Injected challenge & retrospective sections -->
							</div>
						</div>

						<!-- Tab Content: Architecture -->
						<div class="cs-tab-content" data-tab="architecture" role="tabpanel">
							<!-- Specs and Tech for MOBILE (hidden on desktop) -->
							<div class="cs-mobile-specs">
								<div class="cs-spec-grid m-specs">
									<!-- Injected spec badges on mobile -->
								</div>
								<div class="cs-tech-list m-tech">
									<!-- Injected tech tags on mobile -->
								</div>
							</div>
							<div class="cs-architecture-sections">
								<!-- Injected architecture sections -->
							</div>
						</div>

						<!-- Tab Content: Sandbox -->
						<div class="cs-tab-content" data-tab="sandbox" role="tabpanel">
							<div class="cs-interactive-widget" id="widget-container">
								<!-- Injected dynamically -->
							</div>
						</div>
					</article>
				</div>
			</section>
		</template>

		<!-- Template for Project Grid Card -->
		<template id="tpl-project-card">
			<article class="project-card reveal">
				<div class="project-img-wrap">
					<img src="" alt="" loading="lazy" />
					<div class="project-card-overlay">
						<span class="project-card-kicker"></span>
					</div>
				</div>
				<div class="project-body">
					<h3 class="project-title"></h3>
					<p class="project-desc"></p>
					<div class="project-links">
						<!-- Injected links -->
					</div>
				</div>
			</article>
		</template>
