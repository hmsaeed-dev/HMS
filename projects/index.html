<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects & Case Studies | HMS</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  
  <!-- Modular Architecture (Relative to Projects Page/) -->
  <link rel="stylesheet" href="css/main.css">
  <script type="module" src="js/main.js"></script>
</head>
<body>

  <a href="../index.html" class="cs-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Portfolio
  </a>

  <header class="cs-hero">
    <div class="cs-hero-content">
      <p class="cs-hero-eyebrow">Case Studies</p>
      <h1 class="cs-title">Selected <em>Works</em></h1>
      <p class="cs-intro">A deep dive into the architecture, logic, and philosophy behind my digital builds.</p>
      
      <div class="cs-hero-stats">
        <div class="cs-stat">
          <span class="cs-stat-num" id="statProjects">0</span>
          <span class="cs-stat-label">Projects</span>
        </div>
        <div class="cs-stat">
          <span class="cs-stat-num" id="statTech">0</span>
          <span class="cs-stat-label">Technologies</span>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    
    <!-- Filter Bar -->
    <div class="cs-filter-bar">
      <div class="cs-filter-left">
        <span class="cs-filter-label">Filter by</span>
        <!-- Buttons injected by JS -->
      </div>
      <div class="cs-view-count">
        Showing <span id="visibleCount">0</span> works
      </div>
    </div>

    <div id="case-studies-container">
      <!-- Dynamic content injected by JS -->
    </div>

  </main>

  <template id="tpl-case-study">
    <section class="case-study reveal">
      <div class="cs-grid">
        
        <aside class="cs-meta">
          <span class="cs-tag"></span>
          <h2 class="cs-sidebar-title"></h2>
          <p class="cs-sidebar-desc"></p>
          
          <div class="cs-tech-list">
            <!-- Injected -->
          </div>

          <div class="project-links">
            <a href="#" class="btn-outline btn-source">Source Code</a>
          </div>
        </aside>

        <article class="cs-content">
           <!-- Injected -->
        </article>

      </div>
    </section>
  </template>

  <footer class="section" style="text-align: center; color: var(--ink-40);">
    <div class="container">
      <p>© 2026 Hafiz Muhammad Saeed — Building Narratives with Code.</p>
    </div>
  </footer>

</body>
</html>
