<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- Primary Meta Tags -->
		<title>Photography | Hafiz Muhammad Saeed</title>
		<meta name="title" content="Photography Portfolio | Hafiz Muhammad Saeed">
		<meta name="description" content="Explore macro photography, flora and landscape captured by Hafiz Muhammad Saeed in Taxila and beyond.">
		<meta name="keywords" content="Macro Photography Pakistan, Margalla Hills, Flora Photography, Taxila Photography, Hafiz Muhammad Saeed Photography">
		<link rel="canonical" href="https://hmsaeed101.github.io/HMS/photography/">

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website">
		<meta property="og:site_name" content="HMS Photography" />
		<meta property="og:url" content="https://hmsaeed101.github.io/HMS/photography/">
		<meta property="og:title" content="Photography | Hafiz Muhammad Saeed">
		<meta property="og:description" content="Macro details, quiet flora, and landscapes — moments caught in Taxila and beyond.">
		<meta property="og:image" content="https://res.cloudinary.com/dkpehrpdm/image/upload/q_auto/f_auto/v1779626952/logo_te0qiv.webp">

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image">
		<meta property="twitter:url" content="https://hmsaeed101.github.io/HMS/photography/">
		<meta property="twitter:title" content="Photography | Hafiz Muhammad Saeed">
		<meta property="twitter:description" content="Macro details, quiet flora, and landscapes — moments caught in Taxila and beyond.">
		<meta property="twitter:image" content="https://res.cloudinary.com/dkpehrpdm/image/upload/q_auto/f_auto/v1779626952/logo_te0qiv.webp">

		<!-- Structured Data -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "CollectionPage",
				"name": "Photography Portfolio - Hafiz Muhammad Saeed",
				"description": "A collection of macro, bird, and flora photography by Hafiz Muhammad Saeed captured in Taxila and beyond.",
				"url": "https://hmsaeed101.github.io/HMS/photography/",
				"author": {
					"@type": "Person",
					"name": "Hafiz Muhammad Saeed"
				}
			}
		</script>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap"
			rel="stylesheet"
		/>

		<link
			rel="icon"
			href="../src/icons/hms.svg"
			type="image/svg+xml"
		/>

		<link rel="stylesheet" as="style" href="../src/css/main.css" />
		<script type="module" src="../src/js/photography.js"></script>
	</head>

	<body>
		<!-- ── SCROLL PROGRESS ─────────────────────────────────────── -->
		<div
			class="scroll-progress"
			id="scrollProgress"
			style="z-index: 4000"
		></div>

		<!-- ── HERO ─────────────────────────────────────────────────── -->
		<section class="pg-hero" id="pg-hero">
			<div class="pg-hero-bg" id="heroBg"></div>

			<a href="../index.html" class="pg-back">
				<svg
					width="16"
					height="16"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
				>
					<polyline points="15 18 9 12 15 6" />
				</svg>
				Back to Portfolio
			</a>

			<div class="pg-hero-content">
				<h1 class="pg-hero-title">Photography</h1>
				<p class="pg-hero-sub">
					Captured with Patience, Shared with Purpose.
				</p>
				<div class="pg-hero-stats">
					<div class="pg-stat">
						<span class="pg-stat-num" id="statTotal">0</span>
						<span class="pg-stat-label">Photographs</span>
					</div>
					<div class="pg-stat">
						<span class="pg-stat-num" id="statCats">0</span>
						<span class="pg-stat-label">Categories</span>
					</div>
				</div>
			</div>
		</section>

		<!-- ── GALLERY ───────────────────────────────────────────────── -->
		<section class="pg-body" id="pg-gallery">
			<div class="pg-container">
				<!-- Filter bar -->
				<div class="pg-filter-bar">
					<div class="pg-filter-left">
						<span class="pg-filter-label">Filter by</span>
						<!-- buttons injected by JS -->
					</div>
					<div class="pg-filter-right">
						<div class="pg-view-switcher" id="viewSwitcher">
							<button class="pg-view-btn active" data-view="rhythm" aria-label="Rhythm View (Masonry)">
								<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="11" width="7" height="9"></rect><rect x="3" y="15" width="7" height="5"></rect></svg>
							</button>
							<button class="pg-view-btn" data-view="order" aria-label="Order View (Grid)">
								<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
							</button>
							<button class="pg-view-btn" data-view="focus" aria-label="Focus View (Cinematic)">
								<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="14" x2="20" y2="14"/></svg>
							</button>
						</div>
						<div class="pg-view-count">
							Showing <span id="visibleCount">0</span> photos
						</div>
					</div>
				</div>

				<!-- Grid -->
				<div class="pg-grid" id="pgGrid"></div>
				<div class="pg-empty" id="pgEmpty">
					<div class="pg-empty-icon">🔭</div>
					<h3 class="pg-empty-title">Waiting for the Light</h3>
					<p class="pg-empty-sub">
						This category hasn't been populated yet. Check back soon
						for new captures.
					</p>
				</div>
			</div>
		</section>

		<!-- ── LIGHTBOX ──────────────────────────────────────────────── -->
		<div
			class="pg-lightbox"
			id="lightbox"
			role="dialog"
			aria-modal="true"
			aria-label="Photo viewer"
		>
			<!-- Loading Spinner -->
			<div class="pg-lb-loader" id="lightboxLoader"></div>

			<div class="pg-lb-inner">
				<figure class="pg-lb-img-wrap" id="pgLbWrap">
					<img class="pg-lb-img" id="lightboxImg" src="" alt="" />
					<figcaption class="pg-lb-caption" id="pgLbCaption">
						<div class="pg-lb-cat" id="pgLbCat"></div>
						<h2 class="pg-lb-title" id="pgLbTitle"></h2>
						<div class="pg-lb-exif" id="pgLbExif"></div>
						<p class="pg-lb-desc" id="pgLbDesc"></p>
					</figcaption>
				</figure>
			</div>

			<button class="pg-lb-close" id="lightboxClose" aria-label="Close">
				✕
			</button>
			<button
				class="pg-lb-nav pg-lb-prev"
				id="lightboxPrev"
				aria-label="Previous"
			>
				<svg
					width="22"
					height="22"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
				>
					<polyline points="15 18 9 12 15 6" />
				</svg>
			</button>
			<button
				class="pg-lb-nav pg-lb-next"
				id="lightboxNext"
				aria-label="Next"
			>
				<svg
					width="22"
					height="22"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
				>
					<polyline points="9 18 15 12 9 6" />
				</svg>
			</button>
			<div class="pg-lb-counter" id="lightboxCounter"></div>
		</div>
	</body>
</html>
