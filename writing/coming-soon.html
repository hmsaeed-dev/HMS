<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', serif;
      background: #c4da9533;
      color: black;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .label {
      font-family: "Cormorant Garamond", serif;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: black;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 400;
      color: black;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    p {
      font-size: 1rem;
      color: black;
      margin-bottom: 2.5rem;
      font-style: italic;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: "Cormorant Garamond", serif;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: black;
      text-decoration: none;
      border: 2px solid rgb(58, 48, 48);
      border-radius: 20px;
      font-weight: 900;
      padding: 0.6rem 1.2rem;
      transition: all 0.2s ease;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="label">HMS · Writing</div>
    <h1>Coming Soon</h1>
    <p>This piece is still being written.</p>
    <a class="back-btn" onclick="history.back(); return false;" href="#">Go Back</a>
  </div>
</body>
</html>
