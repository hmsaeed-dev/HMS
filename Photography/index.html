		<link rel="preload" fetchpriority="high" as="image" href="https://res.cloudinary.com/dkpehrpdm/image/upload/f_auto,q_auto/rose-1_nyur4f" type="image/webp">

		<!-- Theme Detection -->
		<script>
			(function() {
				const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
				document.documentElement.setAttribute('data-theme', theme);
			})();
		</script>

		<!-- Critical CSS -->
		<style>
			:root {
				--olive:#728649;--olive-lt:#8a9e60;--warm-bg:#f7f4ef;--white:#ffffff;--white-60:rgba(255,255,255,0.6);
				--color-bg:var(--warm-bg);--color-accent-lt:var(--olive-lt);--fs-h1:clamp(3.2rem, 8vw + 1rem, 7rem);
				--space-md:1.5rem;--space-lg:3rem;--header-height:80px;
			}
			[data-theme="dark"] { --warm-bg:#1a1814;--white:#24211c; }
			*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
			body{background:var(--color-bg);font-family:"DM Sans",sans-serif;line-height:1.6;overflow-x:hidden;}
			.pg-hero{position:relative;height:60vh;min-height:400px;display:flex;align-items:center;justify-content:center;overflow:hidden;color:var(--white);text-align:center;}
			@media (min-width:769px){.pg-hero{height:70vh;min-height:500px;}}
			.pg-hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(0.6) saturate(0.8);transform:scale(1.1);opacity:0;z-index:-1;}
			.pg-hero-bg.loaded{opacity:1;transform:scale(1);}
			.pg-hero-content{max-width:800px;padding:0 var(--space-md);z-index:1;font-style:italic;font-weight:500;color:var(--color-accent-lt);}
			.pg-hero-title{font-family:"Cormorant Garamond",serif;font-size:var(--fs-h1);font-weight:300;line-height:0.9;margin-bottom:var(--space-md);letter-spacing:-0.02em;}
		</style>

		<!-- Non-critical CSS (Deferred) -->
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" media="print" onload="this.media='all'">
		<link rel="stylesheet" href="../src/css/main.css" media="print" onload="this.media='all'">
		<link rel="stylesheet" href="../src/css/components/photography.css" media="print" onload="this.media='all'">
		<noscript>
			<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap">
			<link rel="stylesheet" href="../src/css/main.css">
			<link rel="stylesheet" href="../src/css/components/photography.css">
		</noscript>

		<link rel="icon" href="../src/icons/hms.svg" type="image/svg+xml" />
		<script type="module" src="../src/js/photography.js" defer></script>
	</head>

	<body>
		<!-- ── SCROLL PROGRESS ─────────────────────────────────────── -->
		<div
			class="scroll-progress"
			id="scrollProgress"
			style="z-index: 4000"
		></div>

		<!-- ── HERO ─────────────────────────────────────────────────── -->
		<section class="pg-hero" id="pg-hero">
			<div class="pg-hero-bg" id="heroBg"></div>

			<a href="../index.html" class="pg-back">
				<svg
					width="16"
					height="16"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
				>
					<polyline points="15 18 9 12 15 6" />
				</svg>
				Back to Portfolio
			</a>

			<div class="pg-hero-content">
				<h1 class="pg-hero-title">Photography</h1>
				<p class="pg-hero-sub">
					Captured with Patience, Shared with Purpose.
				</p>
				<div class="pg-hero-stats">
					<div class="pg-stat">
						<span class="pg-stat-num" id="statTotal">0</span>
						<span class="pg-stat-label">Photographs</span>
					</div>
					<div class="pg-stat">
						<span class="pg-stat-num" id="statCats">0</span>
						<span class="pg-stat-label">Categories</span>
					</div>
				</div>
			</div>
		</section>

		<!-- ── GALLERY ───────────────────────────────────────────────── -->
		<section class="pg-body" id="pg-gallery">
			<div class="pg-container">
				<!-- Filter bar -->
				<div class="pg-filter-bar">
					<div class="pg-filter-left">
						<span class="pg-filter-label">Filter by</span>
						<!-- buttons injected by JS -->
					</div>
					<div class="pg-filter-right">
						<div class="pg-view-switcher" id="viewSwitcher">
							<button
								class="pg-view-btn active"
								data-view="rhythm"
								aria-label="Rhythm View (Masonry)"
							>
								<svg
									width="18"
									height="18"
									viewBox="0 0 24 24"
									fill="none"
									stroke="currentColor"
									stroke-width="2"
									stroke-linecap="round"
									stroke-linejoin="round"
								>
									<rect
										x="3"
										y="3"
										width="7"
										height="9"
									></rect>
									<rect
										x="14"
										y="3"
										width="7"
										height="5"
									></rect>
									<rect
										x="14"
										y="11"
										width="7"
										height="9"
									></rect>
									<rect
										x="3"
										y="15"
										width="7"
										height="5"
									></rect>
								</svg>
							</button>
							<button
								class="pg-view-btn"
								data-view="order"
								aria-label="Order View (Grid)"
							>
								<svg
									width="18"
									height="18"
									viewBox="0 0 24 24"
									fill="none"
									stroke="currentColor"
									stroke-width="2"
									stroke-linecap="round"
									stroke-linejoin="round"
								>
									<rect
										x="3"
										y="3"
										width="7"
										height="7"
									></rect>
									<rect
										x="14"
										y="3"
										width="7"
										height="7"
									></rect>
									<rect
										x="14"
										y="14"
										width="7"
										height="7"
									></rect>
									<rect
										x="3"
										y="14"
										width="7"
										height="7"
									></rect>
								</svg>
							</button>
							<button
								class="pg-view-btn"
								data-view="focus"
								aria-label="Focus View (Cinematic)"
							>
								<svg
									width="18"
									height="18"
									viewBox="0 0 24 24"
									fill="none"
									stroke="currentColor"
									stroke-width="2"
									stroke-linecap="round"
									stroke-linejoin="round"
								>
									<rect
										x="4"
										y="4"
										width="16"
										height="16"
										rx="2"
									/>
									<line x1="4" y1="9" x2="20" y2="9" />
									<line x1="4" y1="14" x2="20" y2="14" />
								</svg>
							</button>
						</div>
						<div class="pg-view-count">
							Showing <span id="visibleCount">0</span> photos
						</div>
					</div>
				</div>

				<!-- Grid -->
				<div class="pg-grid" id="pgGrid"></div>
				<div class="pg-empty" id="pgEmpty">
					<div class="pg-empty-icon">🔭</div>
					<h3 class="pg-empty-title">Waiting for the Light</h3>
					<p class="pg-empty-sub">
						This category hasn't been populated yet. Check back soon
						for new captures.
					</p>
				</div>
			</div>
		</section>

		<!-- ── LIGHTBOX ──────────────────────────────────────────────── -->
		<div
			class="pg-lightbox"
			id="lightbox"
			role="dialog"
			aria-modal="true"
			aria-label="Photo viewer"
		>
			<!-- Loading Spinner -->
			<div class="pg-lb-loader" id="lightboxLoader"></div>

			<div class="pg-lb-inner">
				<figure class="pg-lb-img-wrap" id="pgLbWrap">
					<img class="pg-lb-img" id="lightboxImg" src="" alt="" />
					<figcaption class="pg-lb-caption" id="pgLbCaption">
						<div class="pg-lb-cat" id="pgLbCat"></div>
						<h2 class="pg-lb-title" id="pgLbTitle"></h2>
						<div class="pg-lb-exif" id="pgLbExif"></div>
						<p class="pg-lb-desc" id="pgLbDesc"></p>
					</figcaption>
				</figure>
			</div>

			<button class="pg-lb-close" id="lightboxClose" aria-label="Close">
				✕
			</button>
			<button
				class="pg-lb-nav pg-lb-prev"
				id="lightboxPrev"
				aria-label="Previous"
			>
				<svg
					width="22"
					height="22"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
				>
					<polyline points="15 18 9 12 15 6" />
				</svg>
			</button>
			<button
				class="pg-lb-nav pg-lb-next"
				id="lightboxNext"
				aria-label="Next"
			>
				<svg
					width="22"
					height="22"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
				>
					<polyline points="9 18 15 12 9 6" />
				</svg>
			</button>
			<div class="pg-lb-counter" id="lightboxCounter"></div>
		</div>
	</body>
</html>
